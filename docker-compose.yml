version: "3.8"

services:
  ida-vnc:
    image: ida-vnc:9.4
    container_name: ida-vnc
    hostname: ida-vnc
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8443}:6901"
      - "${MCP_PORT:-8745}:8745"

    environment:
      - VNC_PW=${VNC_PASSWORD:-changeme}
      - HOME=/home/kasm-user

    volumes:
      - ${WORKSPACE_HOST_PATH:-~/IDA-workspace}:/home/kasm-user/workspace
      - ${IDA_HEXLIC_HOST_PATH:-~/ida.hexlic}:/home/kasm-user/.idapro/ida.hexlic:ro
